<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — Purrfect Stay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&family=Syne:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/Notifications.css">
</head>
<body>

<aside id="sidebar-root"></aside>
<main class="main">
  <div id="topbar-root"></div>
  <div class="content">

    <!-- STATS -->
    <div class="nt-stats-row">
      <div class="nt-stat">
        <div class="nt-stat-icon" style="background:#EEF2FF">🔔</div>
        <div class="nt-stat-body">
          <div class="nt-stat-val" id="stat-unread">—</div>
          <div class="nt-stat-label">ยังไม่ได้อ่าน</div>
        </div>
      </div>
      <div class="nt-stat">
        <div class="nt-stat-icon" style="background:#CCFBF1">📋</div>
        <div class="nt-stat-body">
          <div class="nt-stat-val" id="stat-care">—</div>
          <div class="nt-stat-label">รายงานดูแล</div>
        </div>
      </div>
      <div class="nt-stat">
        <div class="nt-stat-icon" style="background:#DCFCE7">📅</div>
        <div class="nt-stat-body">
          <div class="nt-stat-val" id="stat-booking">—</div>
          <div class="nt-stat-label">เรื่องการจอง</div>
        </div>
      </div>
      <div class="nt-stat">
        <div class="nt-stat-icon" style="background:#FEF3C7">💰</div>
        <div class="nt-stat-body">
          <div class="nt-stat-val" id="stat-payment">—</div>
          <div class="nt-stat-label">ยืนยันชำระเงิน</div>
        </div>
      </div>
    </div>

    <!-- FILTER TOOLBAR -->
    <div class="nt-toolbar">
      <div class="nt-filter-tabs">
        <button class="nt-tab active" onclick="filterNotifications('all', this)">ทั้งหมด</button>
        <button class="nt-tab" onclick="filterNotifications('unread', this)">🔴 ยังไม่อ่าน</button>
        <button class="nt-tab" onclick="filterNotifications('read', this)">✅ อ่านแล้ว</button>
      </div>
      <div class="nt-type-filter-wrap">
        <label for="nt-type-filter">ประเภท:</label>
        <select id="nt-type-filter" class="nt-type-filter">
          <option value="all">ทั้งหมด</option>
          <option value="CARE_REPORT">รายงานดูแล</option>
          <option value="NEW_BOOKING_ALERT">จองใหม่</option>
          <option value="BOOKING_CONFIRMED">ยืนยันจอง</option>
          <option value="BOOKING_CANCELLED">ยกเลิก</option>
          <option value="PAYMENT_CONFIRMED">ชำระเงิน</option>
          <option value="CHECKIN_REMINDER">แจ้งเตือน</option>
        </select>
      </div>
      <div class="nt-spacer"></div>
      <span id="nt-count" style="font-size:12.5px;color:var(--nt-text-3)">—</span>
      <button class="nt-mark-btn" onclick="markAllRead()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
        อ่านทั้งหมด
      </button>
      <button class="nt-mark-btn secondary" onclick="markAllUnread()">ยังไม่อ่านทั้งหมด</button>
    </div>

    <!-- NOTIFICATION LIST -->
    <div class="nt-list" id="nt-list"></div>
    <div class="nt-empty" id="nt-empty" style="display:none">
      <div class="nt-empty-icon">🔔</div>
      <p>ไม่มีการแจ้งเตือนในหมวดนี้</p>
    </div>

  </div>
</main>

<script src="js/components/sidebar.js"></script>
<script src="js/components/navbar.js"></script>
<script src="js/services/api.js"></script>
<script src="js/components/pagination.js"></script>
<script src="js/pages/Notifications.js"></script>
<script>
  const currentUser = Sidebar.enforceAdminSession();
  if (!currentUser) throw new Error('Missing admin session');
  Sidebar.render({ activePage: 'notifications', user: currentUser });
  Navbar.render({
    title: 'Notifications',
    breadcrumb: 'Admin › การแจ้งเตือน (FR7)',
    actionsHTML: `
      <button class="btn-cancel" onclick="markAllRead()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
        อ่านทั้งหมด
      </button>
    `,
  });
</script>
</body>
</html>
