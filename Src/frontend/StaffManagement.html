<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Management — Purrfect Stay</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">

  <!-- Global styles -->
  <link rel="stylesheet" href="css/main.css">
  <!-- Shared component styles -->
  <link rel="stylesheet" href="css/components.css">
  <!-- Page-specific styles -->
  <link rel="stylesheet" href="css/pages/StaffManagement.css">
  <link rel="icon" href="assets/favicon.ico">
</head>

<body>

  <!-- ── SIDEBAR ── -->
  <aside id="sidebar-root"></aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- TOPBAR -->
    <div id="topbar-root"></div>

    <!-- CONTENT -->
    <div class="content">

      <!-- STAT CARDS -->
      <div class="stats-row">
        <div class="stat-card blue" onclick="clickStatCard('total')" style="cursor:pointer;">
          <div class="stat-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </div>
          <div class="stat-label">Total Staff</div>
          <div class="stat-value" id="stat-total-staff">0</div>
          <div class="stat-sub" id="stat-sub-staff">0 Admin · 0 Staff</div>
        </div>
        <div class="stat-card teal" onclick="clickStatCard('onduty')" style="cursor:pointer;">
          <div class="stat-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div class="stat-label">On Duty Now</div>
          <div class="stat-value" id="stat-on-duty">0</div>
          <div class="stat-sub" id="stat-sub-on-duty">0 offline today</div>
        </div>
        <div class="stat-card amber" onclick="clickStatCard('leave')" style="cursor:pointer;">
          <div class="stat-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div class="stat-label">Leave Pending</div>
          <div class="stat-value" id="stat-leave-pending">0</div>
          <div class="stat-sub">รอการอนุมัติ</div>
        </div>
        <div class="stat-card red" onclick="clickStatCard('absent')" style="cursor:pointer;">
          <div class="stat-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div class="stat-label">Absent Today</div>
          <div class="stat-value" id="stat-absent">0</div>
          <div class="stat-sub">เปรียบเทียบเมื่อวาน</div>
        </div>
      </div>

      <!-- TABS -->
      <div class="tabs-container">
        <div class="tabs-header">
          <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('staff', this)">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              Staff List <span class="tab-count" id="tab-count-staff">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('attendance', this)">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
              Attendance <span class="tab-count" id="tab-count-att">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('leave', this)">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3M3 11h18M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              Leave Requests <span class="tab-count" id="leave-count">0</span>
            </button>
          </div>
          <div class="tabs-tools">
            <div class="search-wrap">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              <input class="search-input" type="text" placeholder="ค้นหาชื่อหรืออีเมล..." oninput="filterStaff(this.value)">
            </div>
            <button class="filter-btn">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 4h18M7 12h10M11 20h2"/></svg>
              Filter
            </button>
          </div>
        </div>

        <!-- TAB: STAFF LIST -->
        <div class="tab-content active" id="tab-staff">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Staff</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Phone</th>
                  <th>Hire Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="staff-tbody">
                <!-- ข้อมูลจะถูกใส่ผ่าน JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- TAB: ATTENDANCE -->
        <div class="tab-content" id="tab-attendance">
          <div class="att-toolbar">
            <span class="att-label">ช่วงวันที่:</span>
            <input class="date-input" type="date" value="2026-04-01">
            <span class="att-label">ถึง</span>
            <input class="date-input" type="date" value="2026-04-30">
            <button class="btn-primary" id="btn-search-attendance" style="padding:7px 14px;font-size:13px">ค้นหา</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Staff</th>
                  <th>วันที่</th>
                  <th>Clock In</th>
                  <th>Clock Out</th>
                  <th>สถานะ</th>
                  <th>หมายเหตุ</th>
                </tr>
              </thead>
              <tbody>
                 <!-- ข้อมูลจะถูกใส่ผ่าน JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- TAB: LEAVE REQUESTS -->
        <div class="tab-content" id="tab-leave">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Staff</th>
                  <th>ประเภทการลา</th>
                  <th>วันที่ลา</th>
                  <th>เหตุผล</th>
                  <th>สถานะ</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <!-- ข้อมูลจะถูกใส่ผ่าน JS -->
              </tbody>
            </table>
          </div>
        </div>

      </div><!-- /.tabs-container -->
    </div><!-- /.content -->
  </main>

  <!-- ADD / EDIT STAFF MODAL -->
  <div class="modal-overlay" id="modal-add">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Add New Staff</div>
        <div class="modal-close" onclick="closeModal()">✕</div>
      </div>
      <div class="modal-body">
        
        <!-- ซ่อน ID พนักงานไว้ใช้ตอน Update -->
        <input type="hidden" id="current-staff-id" value="">

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">ชื่อ</label>
            <input class="form-input" type="text" placeholder="ชื่อจริง">
          </div>
          <div class="form-group">
            <label class="form-label">นามสกุล</label>
            <input class="form-input" type="text" placeholder="นามสกุล">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input class="form-input" type="text" placeholder="staff_username">
          </div>
          <div class="form-group">
            <label class="form-label">Role</label>
            <select class="form-select">
              <option value="STAFF">STAFF</option>
              <option value="ADMIN">ADMIN</option>
            </select>
          </div>
        </div>
        <div class="form-row full">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" placeholder="staff@purrfect.com">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">เบอร์โทร</label>
            <input class="form-input" type="text" placeholder="0XX-XXX-XXXX">
          </div>
          <div class="form-group">
            <label class="form-label">วันที่เริ่มงาน</label>
            <input class="form-input" type="date">
          </div>
        </div>
        <div class="form-row full">
          <div class="form-group">
            <label class="form-label">Password เริ่มต้น</label>
            <input class="form-input" type="password" placeholder="••••••••">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveStaff()">Save Staff</button>
      </div>
    </div>
  </div>

  <!-- ── JS: Components (must load before page scripts) ── -->
  <script src="js/components/sidebar.js"></script>
  <script src="js/components/navbar.js"></script>

  <!-- ── JS: API Layer ── -->
  <script src="js/services/api.js"></script>

  <!-- ── JS: Page logic ── -->
  <script src="js/pages/StaffManagement.js"></script>

  <!-- ── JS: Boot ── -->
  <script>
    const currentUser = {
      name: localStorage.getItem('first_name') || 'สมชาย มั่นคง',
      role: localStorage.getItem('role') || 'Administrator',
    };

    Sidebar.render({
      activePage: 'staff',
      user: currentUser,
    });

    Navbar.render({
      title: 'Staff Management',
      breadcrumb: 'Admin › Staff Management',
      actionsHTML: `
      <button class="btn-primary" onclick="openModal()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M12 4v16m8-8H4"/>
        </svg>
        Add New Staff
      </button>
    `,
    });
  </script>
</body>
</html>
