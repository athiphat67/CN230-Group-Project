<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Unit Tests — Purrfect Stay Frontend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080d14;
      --surface:   #0e1623;
      --surface2:  #131e2e;
      --border:    #1d2d44;
      --border2:   #243548;
      --pass:      #22d3a0;
      --pass-dim:  #0f3028;
      --fail:      #f1503a;
      --fail-dim:  #2d1210;
      --skip:      #64748b;
      --skip-dim:  #141c28;
      --accent:    #5b8af5;
      --accent2:   #7c5bf5;
      --text1:     #e8f0fe;
      --text2:     #8ba3c7;
      --text3:     #4a6282;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text1);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #0e1623 0%, #091020 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 40px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-paw {
      font-size: 28px;
      filter: drop-shadow(0 0 12px rgba(91,138,245,.5));
    }
    .logo-text h1 {
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 800;
      color: var(--text1);
      letter-spacing: -.3px;
      line-height: 1;
    }
    .logo-text p {
      font-size: 11px;
      color: var(--text3);
      margin-top: 3px;
      letter-spacing: .5px;
    }
    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }

    /* ── SUMMARY CARDS ── */
    .summary-strip {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .stat-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 72px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.pass-card::before  { background: var(--pass); }
    .stat-card.fail-card::before  { background: var(--fail); }
    .stat-card.skip-card::before  { background: var(--skip); }
    .stat-card.total-card::before { background: var(--accent); }
    .stat-val {
      font-family: var(--sans);
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }
    .pass-card  .stat-val { color: var(--pass); }
    .fail-card  .stat-val { color: var(--fail); }
    .skip-card  .stat-val { color: var(--skip); }
    .total-card .stat-val { color: var(--accent); }
    .stat-label { font-size: 10px; color: var(--text3); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

    /* Progress bar */
    .progress-wrap {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      min-width: 120px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--pass), #3bf5c4);
      transition: width .6s cubic-bezier(.16,1,.3,1);
    }
    .progress-fill.has-fail {
      background: linear-gradient(90deg, var(--pass) 0%, var(--fail) 100%);
    }

    /* ── TOOLBAR ── */
    .toolbar {
      padding: 16px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--surface);
    }
    .filter-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }
    .tab {
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 7px;
      border: none;
      background: none;
      color: var(--text3);
      cursor: pointer;
      transition: all .15s;
      font-weight: 500;
    }
    .tab.active       { background: var(--surface2); color: var(--text1); }
    .tab.active.pass  { color: var(--pass); }
    .tab.active.fail  { color: var(--fail); }
    .tab.active.skip  { color: var(--skip); }
    .tab:hover:not(.active) { color: var(--text2); }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      flex: 1;
      max-width: 340px;
      transition: border-color .15s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-box span { color: var(--text3); font-size: 14px; }
    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--text1);
      font-family: var(--mono);
      font-size: 12px;
      padding: 9px 0;
      width: 100%;
    }
    .search-box input::placeholder { color: var(--text3); }

    .collapse-all-btn {
      margin-left: auto;
      font-size: 11px;
    }

    /* ── CONTENT ── */
    .content {
      padding: 28px 40px;
      max-width: 1100px;
    }

    /* ── SUITE ── */
    .suite {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 16px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .suite:hover { border-color: var(--border2); }
    .suite.all-hidden { display: none; }

    .suite-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .suite-header:hover { background: var(--surface2); }
    .suite.open .suite-header { border-bottom-color: var(--border); }

    .suite-toggle {
      color: var(--text3);
      font-size: 10px;
      transition: transform .2s;
      flex-shrink: 0;
    }
    .suite.open .suite-toggle { transform: rotate(90deg); }

    .suite-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .suite-dot.pass { background: var(--pass); box-shadow: 0 0 6px var(--pass); }
    .suite-dot.fail { background: var(--fail); box-shadow: 0 0 6px var(--fail); }
    .suite-dot.skip { background: var(--skip); }

    .suite-name {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      color: var(--text1);
      flex: 1;
    }
    .suite-name em {
      font-style: normal;
      color: var(--accent);
    }
    .suite-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 11px;
    }
    .suite-count {
      padding: 2px 10px;
      border-radius: 99px;
      font-weight: 600;
    }
    .suite-count.pass { background: var(--pass-dim); color: var(--pass); }
    .suite-count.fail { background: var(--fail-dim); color: var(--fail); }
    .suite-time { color: var(--text3); }

    .suite-body {
      display: none;
      padding: 8px 0;
    }
    .suite.open .suite-body { display: block; }

    /* ── TEST ROW ── */
    .test-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 9px 20px;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .test-row:last-child { border-bottom: none; }
    .test-row:hover { background: rgba(255,255,255,.015); }

    .test-row.filtered-hide { display: none; }

    .test-status {
      flex-shrink: 0;
      width: 16px;
      text-align: center;
      margin-top: 1px;
      font-size: 13px;
    }
    .test-row.pass .test-status { color: var(--pass); }
    .test-row.fail .test-status { color: var(--fail); }
    .test-row.skip .test-status { color: var(--skip); }

    .test-name {
      flex: 1;
      line-height: 1.5;
    }
    .test-row.pass .test-name { color: #b0d8c8; }
    .test-row.fail .test-name { color: #f5b0a0; }
    .test-row.skip .test-name { color: var(--text3); }

    .test-time {
      font-size: 10px;
      color: var(--text3);
      flex-shrink: 0;
      padding-top: 2px;
    }
    .test-error {
      margin-top: 5px;
      padding: 8px 12px;
      background: var(--fail-dim);
      border-left: 2px solid var(--fail);
      border-radius: 0 6px 6px 0;
      font-size: 11px;
      color: #f5b0a0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .test-cell { flex: 1; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
      font-size: 13px;
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }

    /* ── RESULT BADGE ── */
    .result-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 40px 24px;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
    }
    .result-banner.ok   { background: var(--pass-dim); border: 1px solid #1a4a3a; color: var(--pass); }
    .result-banner.bad  { background: var(--fail-dim); border: 1px solid #4a1a1a; color: var(--fail); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .suite { animation: fadeIn .25s ease both; }
    .suite:nth-child(n+2) { animation-delay: calc(var(--i, 0) * 0.03s); }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-paw">🐾</div>
      <div class="logo-text">
        <h1>Purrfect Stay</h1>
        <p>FRONTEND UNIT TESTS · JS MODULE SUITE</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="copyResults()" title="Copy results as JSON">⎘ Export</button>
      <button class="btn" onclick="expandAll()">↓ Expand All</button>
      <button class="btn primary" onclick="rerun()">↻ Re-run</button>
    </div>
  </div>
  <div class="summary-strip" id="summary-strip">
    <!-- Filled by JS -->
  </div>
</div>

<!-- ═══ TOOLBAR ═══ -->
<div class="toolbar">
  <div class="filter-tabs">
    <button class="tab active" data-filter="all"  onclick="setFilter('all', this)">All</button>
    <button class="tab pass"   data-filter="pass" onclick="setFilter('pass', this)">✓ Passed</button>
    <button class="tab fail"   data-filter="fail" onclick="setFilter('fail', this)">✗ Failed</button>
    <button class="tab skip"   data-filter="skip" onclick="setFilter('skip', this)">⊘ Skipped</button>
  </div>
  <div class="search-box">
    <span>🔍</span>
    <input id="search-input" type="text" placeholder="Search tests…" oninput="applySearch(this.value)">
  </div>
  <button class="btn collapse-all-btn" onclick="collapseAll()">↑ Collapse All</button>
</div>

<!-- ═══ CONTENT ═══ -->
<div class="content" id="content">
  <div id="result-banner"></div>
  <div id="suites-container"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  MICRO TEST FRAMEWORK — v2
// ═══════════════════════════════════════════════════════════════

const registry = { pass: 0, fail: 0, skip: 0, suites: [] };
let _currentSuite = null;

function suite(name, fn) {
  const s = { name, tests: [], totalMs: 0 };
  registry.suites.push(s);
  _currentSuite = s;
  fn();
  _currentSuite = null;
}

function test(name, fn) {
  const t0 = performance.now();
  try {
    fn();
    const ms = +(performance.now() - t0).toFixed(2);
    _currentSuite.tests.push({ name, status: 'pass', ms });
    _currentSuite.totalMs += ms;
    registry.pass++;
  } catch (e) {
    const ms = +(performance.now() - t0).toFixed(2);
    _currentSuite.tests.push({ name, status: 'fail', ms, error: e.message });
    _currentSuite.totalMs += ms;
    registry.fail++;
  }
}

function xtest(name, reason = 'skipped') {
  _currentSuite.tests.push({ name, status: 'skip', ms: 0, error: reason });
  registry.skip++;
}

/* ── Assertions ── */
function expect(val) {
  const chain = {
    toBe:              (exp) => { if (val !== exp)          throw new Error(`toBe failed\n  expected: ${JSON.stringify(exp)}\n  received: ${JSON.stringify(val)}`); },
    toEqual:           (exp) => { if (JSON.stringify(val) !== JSON.stringify(exp)) throw new Error(`toEqual failed\n  expected: ${JSON.stringify(exp)}\n  received: ${JSON.stringify(val)}`); },
    toBeTruthy:        ()    => { if (!val)                 throw new Error(`toBeTruthy failed — got: ${JSON.stringify(val)}`); },
    toBeFalsy:         ()    => { if (val)                  throw new Error(`toBeFalsy failed — got: ${JSON.stringify(val)}`); },
    toBeNull:          ()    => { if (val !== null)         throw new Error(`toBeNull failed — got: ${JSON.stringify(val)}`); },
    toBeUndefined:     ()    => { if (val !== undefined)    throw new Error(`toBeUndefined failed — got: ${JSON.stringify(val)}`); },
    toBeGreaterThan:   (n)   => { if (val <= n)             throw new Error(`Expected ${val} > ${n}`); },
    toBeLessThan:      (n)   => { if (val >= n)             throw new Error(`Expected ${val} < ${n}`); },
    toBeLessThanOrEqual:(n)  => { if (val > n)              throw new Error(`Expected ${val} <= ${n}`); },
    toBeGreaterThanOrEqual:(n)=>{ if (val < n)              throw new Error(`Expected ${val} >= ${n}`); },
    toContain:         (sub) => { if (!String(val).includes(String(sub))) throw new Error(`Expected "${val}" to contain "${sub}"`); },
    toHaveLength:      (n)   => { if ((val?.length ?? -1) !== n) throw new Error(`Expected length ${n}, got ${val?.length}`); },
    toBeCloseTo:       (exp, prec = 2) => {
      const tol = Math.pow(10, -prec) / 2;
      if (Math.abs(val - exp) >= tol) throw new Error(`toBeCloseTo failed — expected ~${exp}, got ${val}`);
    },
    toMatchPattern:    (re)  => { if (!re.test(String(val)))    throw new Error(`"${val}" doesn't match ${re}`); },
    toBeTypeOf:        (t)   => { if (typeof val !== t)         throw new Error(`Expected type "${t}", got "${typeof val}"`); },
    toThrow:           (msgFragment) => {
      if (typeof val !== 'function') throw new Error('toThrow: val must be a function');
      let threw = false, thrownMsg = '';
      try { val(); } catch(e) { threw = true; thrownMsg = e.message; }
      if (!threw) throw new Error('Expected function to throw, but it did not');
      if (msgFragment && !thrownMsg.includes(msgFragment))
        throw new Error(`Expected error containing "${msgFragment}", got "${thrownMsg}"`);
    },
    not: {
      toBe:         (exp) => { if (val === exp)   throw new Error(`not.toBe failed — got ${JSON.stringify(val)}`); },
      toContain:    (sub) => { if (String(val).includes(String(sub))) throw new Error(`not.toContain failed — "${val}" contains "${sub}"`); },
      toBeTruthy:   ()    => { if (val)           throw new Error(`not.toBeTruthy failed — got ${JSON.stringify(val)}`); },
      toBeNull:     ()    => { if (val === null)  throw new Error(`not.toBeNull failed`); },
      toEqual:      (exp) => { if (JSON.stringify(val) === JSON.stringify(exp)) throw new Error(`not.toEqual failed — objects are equal`); },
    },
  };
  return chain;
}


// ═══════════════════════════════════════════════════════════════
//  PURE FUNCTIONS — isolated from each module
// ═══════════════════════════════════════════════════════════════

/* ── Bookings.js ── */
function calcNights(checkin, checkout) {
  const a = new Date(checkin), b = new Date(checkout);
  return Math.max(1, Math.round((b - a) / 86400000));
}
function bk_statusLabel(s) {
  return { PENDING:'รอยืนยัน', CONFIRMED:'Confirmed', CHECKED_IN:'กำลังเข้าพัก',
           CHECKED_OUT:'เช็กเอาต์แล้ว', CANCELLED:'ยกเลิก' }[s] ?? s;
}
function bk_paymentLabel(s) {
  return { cash:'เงินสด', qr:'QR PromptPay', card:'บัตรเครดิต' }[s] ?? s;
}

/* ── Billing.js ── */
function bl_statusLabel(s) {
  return { PAID:'ชำระแล้ว', PENDING_PAYMENT:'รอชำระ' }[s] ?? s ?? '—';
}
function bl_paymentLabel(s) {
  return { cash:'เงินสด', qr_promptpay:'QR PromptPay', credit_card:'บัตรเครดิต' }[s] ?? '—';
}
function bl_paymentIcon(s) {
  return { cash:'💵', qr_promptpay:'📱', credit_card:'💳' }[s] ?? '';
}
function formatDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric' });
}

/* ── PetProfile.js ── */
function calcAge(dob) {
  if (!dob) return '—';
  const diff = Date.now() - new Date(dob).getTime();
  const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
  return years < 1 ? 'น้อยกว่า 1 ปี' : `${years} ปี`;
}
function speciesLabel(s) {
  return { cat:'🐱 แมว', dog:'🐶 สุนัข', other:'🐾 อื่นๆ' }[s] ?? s;
}
function getVaccStatus(pet) {
  if (!pet.vaccines || pet.vaccines.length === 0) return { cls:'none', label:'— ไม่มีข้อมูล' };
  const today = new Date();
  const soon  = new Date(); soon.setDate(soon.getDate() + 60);
  const expired  = pet.vaccines.some(v => new Date(v.expiry_date) < today);
  const expiring = pet.vaccines.some(v => { const d = new Date(v.expiry_date); return d >= today && d <= soon; });
  if (expired)  return { cls:'expired',  label:'⚠ หมดอายุ' };
  if (expiring) return { cls:'expiring', label:'⏰ ใกล้หมดอายุ' };
  return { cls:'valid', label:'✓ ครบถ้วน' };
}
function getVaccExpiry(expiryDate) {
  const today = new Date();
  const soon  = new Date(); soon.setDate(soon.getDate() + 60);
  const d = new Date(expiryDate);
  if (d < today) return { cls:'expired', label:'หมดอายุแล้ว' };
  if (d <= soon) return { cls:'expiring', label:'ใกล้หมดอายุ' };
  return { cls:'valid', label:'ยังใช้ได้' };
}

/* ── Analytics.js ── */
function formatShortDate(s) {
  return new Date(s).toLocaleDateString('th-TH', { day:'numeric', month:'short' });
}
function an_calcAvgBill(revenue, totalBookings) {
  return Math.round(revenue / totalBookings);
}
function an_calcOccupancyPct(rate) {
  return Math.round(rate * 100);
}

/* ── AuditTrail.js ── */
function actionLabel(a) {
  return { CREATE:'➕ CREATE', UPDATE:'✏️ UPDATE', DELETE:'🗑 DELETE',
           CHECKIN:'🟢 CHECK-IN', CHECKOUT:'🟣 CHECK-OUT', APPROVE:'✅ APPROVE' }[a] ?? a;
}
function formatDateTime(s) {
  if (!s) return '—';
  return new Date(s).toLocaleString('th-TH', {
    day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit',
  });
}

/* ── Notifications.js ── */
function typeLabel(t) {
  return {
    CARE_REPORT:'รายงานดูแล', BOOKING_CONFIRMED:'ยืนยันจอง',
    BOOKING_CANCELLED:'ยกเลิกจอง', PAYMENT_CONFIRMED:'ชำระเงิน',
    CHECKIN_REMINDER:'แจ้งเตือน', NEW_BOOKING_ALERT:'จองใหม่',
  }[t] ?? t;
}
function nt_getFiltered(notifications, filter) {
  return notifications.filter(n => {
    if (filter === 'unread') return !n.is_read;
    if (filter !== 'all')    return n.type === filter;
    return true;
  });
}

/* ── Inventory.js ── */
function catLabel(c) {
  return { food:'🌾 อาหาร', supplies:'📦 อุปกรณ์', medicine:'💊 ยา' }[c] ?? c;
}
function getItemStatus(item) {
  const today = new Date();
  const soon  = new Date(); soon.setDate(soon.getDate() + 30);
  const pct   = item.quantity_remaining / item.quantity_total;
  if (item.quantity_remaining <= item.reorder_threshold) return { cls:'danger', label:'⚠ สต็อกต่ำ' };
  if (item.expiry_date && new Date(item.expiry_date) <= soon) return { cls:'expiring', label:'⏰ ใกล้หมดอายุ' };
  if (pct <= 0.4) return { cls:'low', label:'สต็อกน้อย' };
  return { cls:'good', label:'ปกติ' };
}

/* ── PetCare.js ── */
function moodEmoji(mood) {
  return { HAPPY:'😄', NEUTRAL:'😐', ANXIOUS:'😰', SICK:'🤒' }[mood] ?? '😐';
}
function moodLabel(mood) {
  return { HAPPY:'Happy', NEUTRAL:'Neutral', ANXIOUS:'Anxious', SICK:'Sick' }[mood] ?? mood;
}
function calcDaysLeft(checkout) {
  const now = new Date(); now.setHours(0,0,0,0);
  const out = new Date(checkout); out.setHours(0,0,0,0);
  const diff = Math.ceil((out - now) / 86400000);
  if (diff === 0) return 'วันนี้';
  if (diff === 1) return 'อีก 1 วัน';
  if (diff < 0)  return 'เกินกำหนด';
  return `อีก ${diff} วัน`;
}

/* ── api.js ── */
function authHeaders(token) {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`,
  };
}

/* ── dashboard.js ── */
function calcOccupancy(active, total) {
  return total > 0 ? Math.round((active / total) * 100) : 0;
}
function padStat(n) {
  return String(n).padStart(2, '0');
}

// ── Auth & Validation (login, register, forgot-password) ──

// ตรวจสอบรูปแบบ Username (ตัวอักษร ตัวเลข และ underscore เท่านั้น)
function isValidUsername(username) {
  if (!username) return false;
  return /^[a-zA-Z0-9_]+$/.test(username);
}

// ตรวจสอบรูปแบบ Email
function isValidEmail(email) {
  if (!email) return false;
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// คำนวณความแข็งแกร่งของรหัสผ่าน (คืนค่า 0 - 4)
function calcPasswordScore(pw) {
  let score = 0;
  if (!pw) return 0;
  if (pw.length >= 8)  score++; // ความยาว 8 ตัวขึ้นไป
  if (/[A-Z]/.test(pw)) score++; // มีตัวพิมพ์ใหญ่
  if (/[0-9]/.test(pw)) score++; // มีตัวเลข
  if (/[^A-Za-z0-9]/.test(pw)) score++; // มีอักขระพิเศษ
  return score;
}

// จำลองการตรวจสอบสเตตัสของ Progress Bar (Step หน้า Register)
function getStepStatus(currentStep, nodeStep) {
  if (nodeStep < currentStep) return 'done';
  if (nodeStep === currentStep) return 'active';
  return 'pending';
}

// ═══════════════════════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════════════════════

let activeFilter = 'all';
let searchQuery  = '';

function render() {
  const total = registry.pass + registry.fail + registry.skip;
  const pct = total > 0 ? Math.round(registry.pass / total * 100) : 100;

  // Summary strip
  document.getElementById('summary-strip').innerHTML = `
    <div class="stat-card pass-card">
      <div class="stat-val">${registry.pass}</div>
      <div class="stat-label">PASS</div>
    </div>
    <div class="stat-card fail-card">
      <div class="stat-val">${registry.fail}</div>
      <div class="stat-label">FAIL</div>
    </div>
    <div class="stat-card skip-card">
      <div class="stat-val">${registry.skip}</div>
      <div class="stat-label">SKIP</div>
    </div>
    <div class="stat-card total-card">
      <div class="stat-val">${total}</div>
      <div class="stat-label">TOTAL</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill ${registry.fail > 0 ? 'has-fail' : ''}" style="width:${pct}%"></div>
    </div>
    <span style="font-size:12px;color:${registry.fail>0?'var(--fail)':'var(--pass)'};font-weight:600;white-space:nowrap;">
      ${registry.fail > 0 ? `✗ ${registry.fail} failed` : `✓ All ${total} passed`}
    </span>
  `;

  // Result banner
  document.getElementById('result-banner').innerHTML = registry.fail > 0
    ? `<div class="result-banner bad">✗ &nbsp;${registry.fail} test${registry.fail>1?'s':''} failed · ${registry.pass}/${total} passed · ${pct}%</div>`
    : `<div class="result-banner ok">✓ &nbsp;All ${total} tests passed — 100% green</div>`;

  // Suites
  const container = document.getElementById('suites-container');
  container.innerHTML = '';

  registry.suites.forEach((s, si) => {
    const passCnt = s.tests.filter(t => t.status === 'pass').length;
    const failCnt = s.tests.filter(t => t.status === 'fail').length;
    const suiteStatus = failCnt > 0 ? 'fail' : 'pass';
    const ms = s.totalMs.toFixed(1);

    const [file, desc] = s.name.includes(' — ')
      ? s.name.split(' — ')
      : [s.name, ''];

    const testsHtml = s.tests.map(t => `
      <div class="test-row ${t.status}" data-name="${t.name.toLowerCase()}" data-status="${t.status}">
        <div class="test-status">${t.status==='pass'?'✓':t.status==='fail'?'✗':'⊘'}</div>
        <div class="test-cell">
          <div class="test-name">${t.name}</div>
          ${t.status==='fail'?`<div class="test-error">${escHtml(t.error||'')}</div>`:''}
          ${t.status==='skip'&&t.error?`<div class="test-error" style="border-color:var(--skip);background:var(--skip-dim);color:var(--skip)">${escHtml(t.error)}</div>`:''}
        </div>
        <div class="test-time">${t.ms}ms</div>
      </div>
    `).join('');

    const el = document.createElement('div');
    el.className = `suite ${failCnt===0?'open':'open'}`;
    el.style.setProperty('--i', si);
    el.innerHTML = `
      <div class="suite-header" onclick="toggleSuite(this)">
        <span class="suite-toggle">▶</span>
        <div class="suite-dot ${suiteStatus}"></div>
        <div class="suite-name"><em>${file}</em>${desc?' — '+desc:''}</div>
        <div class="suite-meta">
          <span class="suite-count ${suiteStatus}">${passCnt}/${s.tests.length}</span>
          <span class="suite-time">${ms}ms</span>
        </div>
      </div>
      <div class="suite-body">${testsHtml}</div>
    `;
    container.appendChild(el);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleSuite(header) {
  header.closest('.suite').classList.toggle('open');
}

function expandAll()  { document.querySelectorAll('.suite').forEach(s=>s.classList.add('open')); }
function collapseAll(){ document.querySelectorAll('.suite').forEach(s=>s.classList.remove('open')); }

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  applyVisibility();
}

function applySearch(q) {
  searchQuery = q.toLowerCase();
  applyVisibility();
}

function applyVisibility() {
  document.querySelectorAll('.suite').forEach(suite => {
    const rows = suite.querySelectorAll('.test-row');
    let visible = 0;
    rows.forEach(row => {
      const statusMatch = activeFilter === 'all' || row.dataset.status === activeFilter;
      const searchMatch = !searchQuery || row.dataset.name.includes(searchQuery);
      const show = statusMatch && searchMatch;
      row.classList.toggle('filtered-hide', !show);
      if (show) visible++;
    });
    suite.classList.toggle('all-hidden', visible === 0);
  });
}

function rerun() {
  location.reload();
}

function copyResults() {
  const out = {
    timestamp: new Date().toISOString(),
    summary: { pass: registry.pass, fail: registry.fail, skip: registry.skip,
               total: registry.pass+registry.fail+registry.skip },
    suites: registry.suites.map(s => ({
      name: s.name,
      tests: s.tests.map(t => ({ name:t.name, status:t.status, ms:t.ms, error:t.error||null }))
    }))
  };
  navigator.clipboard.writeText(JSON.stringify(out, null, 2))
    .then(() => {
      const btn = document.querySelector('.header-actions .btn');
      const orig = btn.textContent;
      btn.textContent = '✓ Copied!';
      btn.style.color = 'var(--pass)';
      setTimeout(() => { btn.textContent = orig; btn.style.color=''; }, 2000);
    });
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
  if (e.key === 'Escape') document.getElementById('search-input').blur();
});

window.addEventListener('DOMContentLoaded', () => render());
</script>
