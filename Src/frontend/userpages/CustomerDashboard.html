<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — PetSerenity</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/userpages/CustomerDashboard.css">
</head>

<body>
    <aside id="sidebar-root"></aside>

    <div class="page-wrapper">
        <div class="container">

            <!-- ── HERO BANNER ───────────────────────────── -->
            <section class="hero animate-fade-in-up">
                <div class="hero__content">
                    <h1 class="hero__greeting" id="hero-name">Hello!</h1>
                    <p class="hero__subtitle" id="hero-subtitle">
                        Welcome back to your curated sanctuary.
                    </p>
                    <div class="hero__actions">
                        <a href="ReservationForm.html" class="hero__btn hero__btn--white">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <rect x="3" y="4" width="18" height="18" rx="2" />
                                <path d="M16 2v4M8 2v4M3 10h18" />
                            </svg>
                            Make a Reservation
                        </a>
                        <a href="AddPet.html" class="hero__btn hero__btn--outline">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M12 21c-4-3-8-5-8-10a8 8 0 0116 0c0 5-4 7-8 10z" />
                            </svg>
                            My Pets
                        </a>
                    </div>
                </div>
                <div class="hero__visual">🐾</div>
            </section>

            <!-- ── DASHBOARD BODY ────────────────────────── -->
            <div class="dashboard-body">

                <!-- LEFT COLUMN -->
                <div>
                    <!-- Daily Updates -->
                    <div class="updates-card animate-fade-in-up delay-1">
                        <div class="updates-card__header">
                            <h3 class="updates-card__title">Daily Updates</h3>
                            <button class="mark-all-btn" onclick="markAllRead()">Mark all read</button>
                        </div>
                        <div class="notif-list" id="notif-list">
                            <div style="padding:32px;text-align:center">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Active Reservations -->
                    <div class="reservations-section animate-fade-in-up delay-2">
                        <div class="section-header">
                            <h3 class="section-title">Active Reservations</h3>
                            <a href="ReservationForm.html" class="btn btn-secondary btn-sm">See All Activity</a>
                        </div>
                        <div id="reservations-list">
                            <div style="padding:32px;text-align:center">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT COLUMN: Your Family -->
                <div>
                    <div class="family-card animate-fade-in-up delay-2">
                        <div class="family-card__header">
                            <h3 class="family-card__title">Your Family</h3>
                        </div>
                        <div class="family-pet-list" id="family-pet-list">
                            <div style="padding:20px;text-align:center">
                                <div class="spinner spinner--sm"></div>
                            </div>
                        </div>
                        <a href="AddPet.html" class="add-pet-btn">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
                                style="width:16px;height:16px">
                                <path d="M12 5v14M5 12h14" />
                            </svg>
                            Add New Pet
                        </a>
                    </div>
                </div>

            </div><!-- /.dashboard-body -->
        </div><!-- /.container -->
    </div><!-- /.page-wrapper -->

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Scripts — ใช้ usersidebar.js แทน sidebar.js -->
    <script src="../js/main.js"></script>
    <script src="../js/services/api.js"></script>
    <script src="../js/components/usersidebar.js"></script>
    <script src="../js/userpages/CustomerDashboard.js"></script>
</body>

</html>
