<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Profile — PetSerenity</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/userpages/PetProfile.css">
</head>

<body>
    <aside id="sidebar-root"></aside>

    <div class="page-wrapper">
        <div class="container">

            <nav aria-label="breadcrumb" style="margin-top: 16px; font-size: 13px; color: var(--text-3);">
                <a href="CustomerDashboard.html" style="color: var(--primary); text-decoration: none;">My Pets</a>
                <span style="margin: 0 8px;">/</span>
                <span id="breadcrumb-petname" style="font-weight: 600; color: var(--text-1);">Loading...</span>
            </nav>

            <section class="pet-hero animate-fade-in-up">

                <div class="pet-photo-col">
                    <div class="pet-photo-frame" id="pet-photo-wrap">
                        <div class="pet-photo-frame__placeholder">
                            <div class="spinner"></div>
                        </div>
                    </div>
                    <div class="pet-status-badge">
                        <div class="pet-status-badge__dot"></div>
                        Healthy & Happy
                    </div>
                </div>

                <div class="pet-info-col">
                    <div
                        style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px;">
                        <div>
                            <h1 class="pet-name" id="pet-name-heading"
                                style="font-family: 'Cormorant Garamond', serif; color: var(--primary);">Loading...</h1>
                            <p class="pet-subtitle" id="pet-subtitle">Please wait...</p>
                        </div>
                        <div class="pet-actions">
                            <button type="button" id="meal-plan-btn" class="btn btn-primary">
                                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
                                    style="width: 16px; height: 16px; margin-right: 6px;">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                                    </path>
                                </svg>
                                Configure Meal Plan
                            </button>
                        </div>
                    </div>

                    <div class="pet-stats-grid" id="pet-stats-grid"></div>
                </div>

            </section>

            <section class="profile-sections animate-fade-in-up delay-1">

                <div>
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
                        <h3
                            style="font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: var(--text-1);">
                            Vaccination History
                        </h3>
                        <button class="btn-icon" style="color: var(--primary);" title="Add Record">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
                                style="width: 20px; height: 20px;">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </button>
                    </div>

                    <div id="vaccine-list">
                        <div style="padding: 32px; text-align: center;">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>

                <div>
                    <div style="margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
                        <h3
                            style="font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: var(--text-1);">
                            Medical Notes & Allergies
                        </h3>
                    </div>

                    <div
                        style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 24px; box-shadow: var(--shadow-sm);">

                        <div style="margin-bottom: 24px;">
                            <h4
                                style="font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                                <span style="color: var(--danger);">⚠️</span> ACTIVE ALLERGIES
                            </h4>
                            <div class="allergy-tags" id="allergy-tags"></div>
                        </div>

                        <div>
                            <h4
                                style="font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                                <span style="color: var(--primary);">📋</span> CHRONIC CONDITIONS
                            </h4>
                            <div id="conditions-list"></div>
                        </div>

                    </div>
                </div>

            </section>

        </div>
    </div>
    <div id="toast-container"></div>

    <!-- Scripts — ใช้ usersidebar.js แทน sidebar.js -->
    <script src="../js/main.js"></script>
    <script src="../js/services/api.js"></script>
    <script src="../js/components/usersidebar.js"></script>
    <script src="../js/components/pagination.js"></script>
    <script src="../js/userpages/PetProfile.js"></script>
</body>

</html>
